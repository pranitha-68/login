<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="brand-name">Vridire</div>
    <div class="form-box active" id="register-form">
      <form action="welcome.html" method="GET">
        <h2>Register</h2>
        <input type="text" name="name" placeholder="Name*" required><br>
        <input type="email" name="email" placeholder="Email*" required><br>
        <input type="password" name="password" placeholder="Password*" required><br>
        <button type="submit" name="register">Register</button>
        <p class="account-text">Already have an account?<a href="index.html">Login</a></p>
      </form>
      <div class="form-box" id="forgot-password-form">
            <form id="forgot-password-form">
                <h2>Forgot Password</h2>
                <input type="email" name="email" placeholder="Email*" required>
                <button type="button" id="send-otp-btn">Send OTP</button>
            </form>
<form action="register.php" method="post">
  <input type="text" name="username" placeholder="Username">
  <input type="email" name="email" placeholder="Email">
  <input type="password" name="password" placeholder="Password">
  <button type="submit">Register</button>
</form>

        </div>
        <div class="form-box" id="otp-form">
            <form id="otp-form">
                <h2>Enter OTP</h2>
                <input type="number" name="otp" placeholder="OTP*" required>
                <button type="button" id="verify-otp-btn">Verify OTP</button>
            </form>
        </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
