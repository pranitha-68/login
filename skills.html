<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skills</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="brand-name">Vridire</div>
        <div class="form-box active" id="skills-form">
            <form id="skills">
                <h2>Skills</h2>
                <select name="skills[]" required>
                    <option value="Python">Python</option>
                    <option value="Java">Java</option>
                    <option value="C">C</option>
                    <option value="AI">AI</option>
                    <option value="C++">C++</option>
                    <option value="Data Science">Data Science</option>
                    <option value="Cloud Computing">Cloud Computing</option>
                    <option value="Computer Networking Systems">Computer Networking systems</option>
                    <option value="DataBase Management Systems">DataBase Management Systems</option>
                    <option value="Machine Learning">Machine Learning</option>
                    <option value="Others">Others</option>
                </select>
                <p id="selected-skills"></p>
                <button type="button" onclick="location.href='employment-status.html'">Previous</button>
                <button type="button" onclick="location.href='experience.html'">Next</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
