<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="brand-name">Vridire</div>
        <div class="form-box active" id="forgot-password-form">
            <form id="forgot-password-form">
                <h2>Forgot Password</h2>
                <input type="email" id="email" name="email" placeholder="Email*" required>
                <button type="button" id="send-otp-btn">Send OTP</button>
            </form>
        </div>
        <div class="form-box" id="otp-form">
            <form id="otp-form">
                <h2>Enter OTP</h2>
                <input type="number" id="otp" name="otp" placeholder="OTP*" required>
                <button type="button" id="verify-otp-btn">Verify OTP</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
