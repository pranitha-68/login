<body>

    <div class="form-box active" id="resume-form"> 
        <form id="resume"> 
            <h2>Resume</h2> 
            <select id="resume-select" required> 
                <option value="">Select an option</option>

            </select><br> 
            <input type="file" name="uploadResume" id="upload-resume" accept=".pdf, .docx, .xlsx"><br> 
           <button type="button" onclick="location.href='personal-details.html'">Next</button>
            
        </form> 
    </div>
